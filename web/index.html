<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏛️ IAG Matrix - Dual Dashboard</title>
    <!-- Auto-Load Theme -->
    <script>
        const savedTheme = localStorage.getItem('iag_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-panel: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --box-shadow: rgba(0,0,0,0.4);
            --anim-primary: #3b82f6;
            --poke-primary: #8b5cf6;
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(30, 41, 59, 0.7);
        }

        [data-theme='light'] {
            --bg-main: #f8fafc;
            --bg-panel: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --box-shadow: rgba(0,0,0,0.1);
            --glass-bg: rgba(255, 255, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s;
        }

        /* Top Control Panel */
        .header {
            background: var(--bg-panel);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
        }

        .input-group { display: flex; gap: 10px; align-items: center; }
        .input-group input {
            background: var(--bg-main);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
        }
        .btn {
            background: var(--anim-primary);
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .btn:hover { filter: brightness(1.2); }

        .btn-micro {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.6rem;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .animals-side .btn-micro:hover { background: var(--anim-primary); }
        .pokemons-side .btn-micro:hover { background: var(--poke-primary); }

        /* Split Screen Layout */
        .main-dashboard {
            flex: 1;
            display: flex;
            width: 100%;
            gap: 2px;
            background: var(--glass-border); /* Divider line */
        }

        .system-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-main);
            position: relative;
            overflow: hidden;
        }

        .system-header {
            padding: 10px 15px;
            background: rgba(0,0,0,0.2);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }
        .animals-side .system-header { color: var(--anim-primary); border-top: 3px solid var(--anim-primary); }
        .pokemons-side .system-header { color: var(--poke-primary); border-top: 3px solid var(--poke-primary); }

        /* Graph Area */
        .graph-wrapper {
            flex: 1.5;
            position: relative;
            background: radial-gradient(circle at center, rgba(30, 41, 59, 0.5) 0%, transparent 70%);
        }
        .graph-svg { width: 100%; height: 100%; position: absolute; top:0; left:0; pointer-events: none; }
        
        .central-node {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: 60px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 0.7rem;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .animals-side .central-node { background: var(--anim-primary); border: 3px solid #60a5fa; }
        .pokemons-side .central-node { background: var(--poke-primary); border: 3px solid #a78bfa; }

        .agent-node {
            position: absolute;
            transform: translate(-50%, -50%);
            width: 44px; height: 44px;
            background: var(--bg-panel);
            border: 2px solid var(--glass-border);
            border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
            cursor: pointer;
        }
        .agent-node:hover { transform: translate(-50%, -50%) scale(1.2); z-index: 20; border-color: white; }
        .agent-node.active-learning { border-width: 3px; animation: glow 1.5s infinite alternate; }
        .animals-side .agent-node.active-learning { border-color: var(--anim-primary); box-shadow: 0 0 15px var(--anim-primary); }
        .pokemons-side .agent-node.active-learning { border-color: var(--poke-primary); box-shadow: 0 0 15px var(--poke-primary); }

        @keyframes glow { from { opacity: 0.7; } to { opacity: 1; } }

        .node-emoji { font-size: 1.2rem; }
        .node-name {
            position: absolute; bottom: -18px; font-size: 0.6rem; color: var(--text-muted);
            white-space: nowrap; pointer-events: none;
        }
        .node-prof {
            position: absolute; top: -10px; background: #10b981; color: white;
            padding: 1px 4px; border-radius: 8px; font-size: 0.55rem; font-weight: bold;
        }

        /* Chat Panels */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.1);
            border-top: 1px solid var(--glass-border);
            overflow: hidden;
        }
        .chat-logs {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .chat-logs::-webkit-scrollbar { width: 4px; }
        .chat-logs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .msg-bubble {
            background: var(--bg-panel);
            padding: 10px; border-radius: 12px;
            font-size: 0.75rem; line-height: 1.4;
            max-width: 85%; align-self: flex-start;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border: 1px solid var(--glass-border);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-author { font-weight: 800; font-size: 0.65rem; margin-bottom: 4px; color: var(--text-muted); }
        .msg-bubble.is-helper { align-self: flex-end; border-color: var(--anim-primary); }
        .pokemons-side .msg-bubble.is-helper { border-color: var(--poke-primary); }

        .refinement-note {
            font-size: 0.65rem; color: #fbbf24; font-style: italic; padding: 5px 10px;
            background: rgba(245, 158, 11, 0.05); border-radius: 6px; margin-bottom: 10px;
            border-left: 2px solid #fbbf24;
        }

        .status-footer {
            position: fixed; bottom: 10px; left: 10px;
            font-size: 0.65rem; color: var(--text-muted); display: flex; align-items: center; gap: 5px;
        }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: #ef4444; }
        .dot.online { background: #10b981; box-shadow: 0 0 5px #10b981; }

    </style>
</head>
<body>

    <header class="header">
        <div style="font-weight: 900; font-size: 0.9rem;">IAG <span style="color:var(--anim-primary)">MATRIX</span></div>
        <div class="input-group">
            <input type="password" id="apiKey" placeholder="Gemini API Key" style="width: 140px;">
            <input type="text" id="topic" placeholder="Tópico de Pesquisa..." style="width: 200px;">
            <button class="btn" onclick="startLearning()">INICIAR SINCRONIA</button>
        </div>
        <div onclick="toggleTheme()" style="cursor:pointer; opacity: 0.6;">🌗</div>
    </header>

    <main class="main-dashboard">
        <!-- Lado dos Animais -->
        <section class="system-column animals-side">
            <div class="system-header">
                <div style="display: flex; gap: 5px; align-items: center;">
                    <button class="btn-micro" onclick="startLearning('animals')">DISPARAR</button>
                    <label class="btn-micro" title="Anexar Arquivo para Animais">
                        📂 <input type="file" id="file-animals" hidden onchange="handleFile(event, 'animals')">
                    </label>
                    <span id="label-animals" style="font-size: 0.6rem; color: #10b981; max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
                </div>
                <span>Córtex Selvagem</span>
                <span style="font-size: 0.6rem; opacity: 0.5;">v2.5_fauna</span>
            </div>
            <div class="graph-wrapper" id="area-animals">
                <svg class="graph-svg" id="svg-animals"></svg>
                <div class="central-node">CORE</div>
            </div>
            <div class="chat-panel">
                <div class="chat-logs" id="chat-animals">
                    <div class="refinement-note">Aguardando sinais bio-digitais...</div>
                </div>
            </div>
        </section>

        <!-- Lado dos Pokemons -->
        <section class="system-column pokemons-side">
            <div class="system-header">
                <div style="display: flex; gap: 5px; align-items: center;">
                    <button class="btn-micro" onclick="startLearning('pokemons')">DISPARAR</button>
                    <label class="btn-micro" title="Anexar Arquivo para Pokemons">
                        📂 <input type="file" id="file-pokemons" hidden onchange="handleFile(event, 'pokemons')">
                    </label>
                    <span id="label-pokemons" style="font-size: 0.6rem; color: #a78bfa; max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
                </div>
                <span>Nexo Elemental</span>
                <span style="font-size: 0.6rem; opacity: 0.5;">v1.0_nexo</span>
            </div>
            <div class="graph-wrapper" id="area-pokemons">
                <svg class="graph-svg" id="svg-pokemons"></svg>
                <div class="central-node">NEXUS</div>
            </div>
            <div class="chat-panel">
                <div class="chat-logs" id="chat-pokemons">
                    <div class="refinement-note">Sintonizando frequencias elementares...</div>
                </div>
            </div>
        </section>
    </main>

    <div class="status-footer">
        <div class="dot" id="status-dot"></div>
        <span id="status-text">DISCONNECTED</span>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        let ws = null;
        let agentsDict = { animals: {}, pokemons: {} };
        let uploads = { animals: null, pokemons: null };

        function toggleTheme() {
            const html = document.documentElement;
            const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('iag_theme', newTheme);
        }

        function getEmoji(name, system) {
            const animalMap = {
                'Leao': '🦁', 'Tigre': '🐅', 'Elefante': '🐘', 'HipoAgent': '🦛', 'PolvoAgent': '🐙', 'LoboAgent': '🐺',
                'TubaraoAgent': '🦈', 'OrcaAgent': '🐋', 'RinoceronteAgent': '🦏', 'FalcaoAgent': '🦅', 'CrocodiloAgent': '🐊',
                'CavaloAgent': '🐎', 'GorilaAgent': '🦍', 'OvelhaAgent': '🐑', 'CarneiroAgent': '🐏', 'CoelhoAgent': '🐇',
                'AlceAgent': '🦌', 'MarlinAgent': '🐟', 'UrsoPardoAgent': '🐻', 'LeopardoAgent': '🐆', 'CanguruAgent': '🦘', 'BisaoAgent': '🦬'
            };
            const pokeMap = {
                'Pyroar': '🦁', 'Incineroar': '🐅', 'Copperajah': '🐘', 'Hippowdon': '🦛', 'Octillery': '🐙',
                'Lycanroc': '🐺', 'Garchomp': '🦈', 'Kyogre': '🐋', 'Rhyperior': '🦏', 'Talonflame': '🦅',
                'Feraligatr': '🐊', 'Rapidash': '🐎', 'Rillaboom': '🦍', 'Wooloo': '🐑', 'Dubwool': '🐏',
                'Cinderace': '🐇', 'Stantler': '🦌', 'Barraskewda': '🐟', 'Ursaring': '🐻', 'Liepard': '🐆',
                'Kangaskhan': '🦘', 'Bouffalant': '🦬'
            };
            return (system === 'animals' ? animalMap[name] : pokeMap[name]) || '✨';
        }

        function connect() {
            const host = window.location.host || 'localhost:8000';
            ws = new WebSocket(`ws://${host}/ws`);

            ws.onopen = () => {
                document.getElementById('status-dot').className = 'dot online';
                document.getElementById('status-text').textContent = 'MATRIX ONLINE';
            };

            ws.onclose = () => {
                document.getElementById('status-dot').className = 'dot';
                document.getElementById('status-text').textContent = 'RECONNECTING...';
                setTimeout(connect, 3000);
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                handleMessage(msg);
            };
        }

        function handleFile(event, system) {
            const file = event.target.files[0];
            const label = document.getElementById(`label-${system}`);
            if (file) {
                label.textContent = file.name;
                const reader = new FileReader();
                reader.onload = (e) => { uploads[system] = e.target.result; };
                file.name.toLowerCase().endsWith('.pdf') ? reader.readAsDataURL(file) : reader.readAsText(file);
            }
        }

        function handleMessage(msg) {
            if (msg.type === 'init') {
                initSystem(msg.animals, 'animals', '#svg-animals', 'area-animals');
                initSystem(msg.pokemons, 'pokemons', '#svg-pokemons', 'area-pokemons');
            } else if (msg.type === 'learning' || msg.type === 'learning_update') {
                updateNode(msg.agent_id, msg.system, msg.proficiency || msg.new_proficiency, msg.type === 'learning');
            } else if (msg.type === 'conversation') {
                addChat(msg);
            } else if (msg.type === 'refinement') {
                addRefinement(msg);
            }
        }

        function initSystem(agents, systemName, svgId, areaId) {
            const area = document.getElementById(areaId);
            const svg = d3.select(svgId);
            svg.selectAll("*").remove();
            area.querySelectorAll('.agent-node').forEach(n => n.remove());

            const w = area.clientWidth;
            const h = area.clientHeight;
            const radius = Math.min(w, h) * 0.35;

            agents.forEach((agent, i) => {
                agentsDict[systemName][agent.id] = agent;
                const angle = (i / agents.length) * 2 * Math.PI;
                const x = w/2 + radius * Math.cos(angle);
                const y = h/2 + radius * Math.sin(angle);

                // Line
                svg.append("line")
                    .attr("x1", w/2).attr("y1", h/2)
                    .attr("x2", x).attr("y2", y)
                    .attr("stroke", "rgba(255,255,255,0.05)")
                    .attr("id", `link-${systemName}-${agent.id}`);

                // Node
                const node = document.createElement('div');
                node.className = 'agent-node';
                node.id = `node-${systemName}-${agent.id}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerHTML = `
                    <div class="node-prof" id="prof-${systemName}-${agent.id}">0%</div>
                    <div class="node-emoji">${getEmoji(agent.animal, systemName)}</div>
                    <div class="node-name">${agent.animal}</div>
                `;
                area.appendChild(node);
            });
        }

        function updateNode(id, system, prof, active) {
            const node = document.getElementById(`node-${system}-${id}`);
            const profText = document.getElementById(`prof-${system}-${id}`);
            if (node) {
                node.classList.toggle('active-learning', active);
                if (prof !== undefined) profText.textContent = `${Math.round(prof * 100)}%`;
            }
        }

        function addChat(data) {
            const cont = document.getElementById(`chat-${data.system}`);
            const note = cont.querySelector('.refinement-note');
            if (note) note.remove();

            const bubble = document.createElement('div');
            bubble.className = `msg-bubble ${data.is_helper ? 'is-helper' : ''}`;
            bubble.innerHTML = `
                <div class="msg-author">${getEmoji(data.from_agent, data.system)} ${data.from_agent}</div>
                <div>${data.message}</div>
            `;
            cont.appendChild(bubble);
            cont.scrollTop = cont.scrollHeight;
        }

        function addRefinement(data) {
            const cont = document.getElementById(`chat-${data.system}`);
            const div = document.createElement('div');
            div.className = 'refinement-note';
            div.innerHTML = `[MODULACAO] ${data.message}`;
            cont.appendChild(div);
            cont.scrollTop = cont.scrollHeight;
            setTimeout(() => div.remove(), 10000);
        }

        function startLearning(targetSystem = null) {
            const topic = document.getElementById('topic').value.trim();
            const key = document.getElementById('apiKey').value.trim();
            if (!topic && !targetSystem) return alert("Defina um tópico!");
            
            const systems = targetSystem ? [targetSystem] : ['animals', 'pokemons'];
            
            systems.forEach(sys => {
                document.getElementById(`chat-${sys}`).innerHTML = '';
            });

            if (ws && ws.readyState === WebSocket.OPEN) {
                systems.forEach(sys => {
                    ws.send(JSON.stringify({
                        action: 'start_learning',
                        task: topic || (uploads[sys] ? "Processamento de Arquivo" : "Novo Ciclo"),
                        content: uploads[sys] || `Iniciando sincronização profunda sobre ${topic}`,
                        api_keys: { gemini_key: key },
                        target_system: sys
                    }));
                    // Limpa após envio se for individual
                    if (targetSystem) {
                        uploads[sys] = null;
                        document.getElementById(`label-${sys}`).textContent = "";
                    }
                });
            }
        }

        window.onload = () => { connect(); };
    </script>
</body>
</html>
