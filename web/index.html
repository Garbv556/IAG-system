<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏛️ IAG Matrix - Dual Dashboard</title>
    <!-- Auto-Load Theme -->
    <script>
        const savedTheme = localStorage.getItem('iag_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-panel: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --box-shadow: rgba(0,0,0,0.4);
            --anim-primary: #3b82f6;
            --poke-primary: #8b5cf6;
            --neon-green: #10b981;
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(30, 41, 59, 0.7);
        }

        [data-theme='light'] {
            --bg-main: #f8fafc;
            --bg-panel: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --box-shadow: rgba(0,0,0,0.1);
            --glass-bg: rgba(255, 255, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s;
        }


        /* Top Control Panel (Restaurado) */
        .header {
            background: var(--bg-panel);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
        }

        .input-group { display: flex; gap: 10px; align-items: center; }
        .input-group input {
            background: var(--bg-main);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
        }
        .btn {
            background: var(--anim-primary);
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .btn:hover { filter: brightness(1.2); transform: translateY(-1px); }
        .btn.btn-stop { background: #ef4444; margin-left: 5px; }

        /* Sync Button Central (Fusion Ring design) */
        .fusion-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
        }
        .btn-sync {
            background: linear-gradient(135deg, #0ea5e9, #a855f7);
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
            transition: all 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
        }
        .btn-sync:hover { transform: scale(1.1); box-shadow: 0 0 40px rgba(168, 85, 247, 0.6); }

        /* Panel Bottom Controls */
        .panel-footer {
            background: rgba(0,0,0,0.2);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px solid var(--glass-border);
        }
        .control-row { display: flex; gap: 8px; }
        .control-row input {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.75rem;
        }
        .btn-search { background: #00f3ff; color: black; font-weight: 900; }
        .btn-upload { background: #eab308; color: black; font-weight: 900; }

        .btn-micro {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.6rem;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .animals-side .btn-micro:hover { background: var(--anim-primary); }
        .pokemons-side .btn-micro:hover { background: var(--poke-primary); }

        /* Split Screen Layout */
        .main-dashboard {
            flex: 1;
            display: flex;
            width: 100%;
            gap: 2px;
            background: var(--glass-border); /* Divider line */
        }

        .system-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-main);
            position: relative;
            overflow: hidden;
            transition: filter 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .system-column.off {
            filter: brightness(0.5);
        }

        .system-header {
            padding: 10px 15px;
            background: rgba(0,0,0,0.2);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }
        .animals-side .system-header { color: var(--anim-primary); border-top: 3px solid var(--anim-primary); }
        .pokemons-side .system-header { color: var(--poke-primary); border-top: 3px solid var(--poke-primary); }

        /* Graph Area */
        .graph-wrapper {
            flex: 1.5;
            position: relative; /* ESSENCIAL PARA POSICIONAR OS NÓS HTML */
            background: radial-gradient(circle at center, rgba(30, 41, 59, 0.4) 0%, transparent 80%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .graph-svg { width: 100%; height: 100%; position: absolute; top:0; left:0; }
        
        .ring-decor {
            fill: none;
            stroke: var(--glass-border);
            stroke-width: 1px;
            opacity: 0.3;
        }

        .central-node {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: 60px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 0.7rem;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .animals-side .central-node { background: var(--anim-primary); border: 3px solid #60a5fa; }
        .pokemons-side .central-node { background: var(--poke-primary); border: 3px solid #a78bfa; }

        .agent-node {
            position: absolute;
            transform: translate(-50%, -50%);
            width: 44px; height: 44px;
            background: var(--bg-panel);
            backdrop-filter: blur(10px);
            border: 2px solid var(--glass-border);
            border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
            cursor: pointer;
        }
        .agent-node:hover { transform: translate(-50%, -50%) scale(1.15); z-index: 20; border-color: white; }
        .agent-node.active-learning { border-width: 3px; animation: glow 1.5s infinite alternate; }
        .agent-node.inactive { opacity: 0.25; filter: grayscale(1); }

        .agent-toggle-btn {
            position: absolute;
            bottom: -5px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #10b981;
            border: 2px solid var(--bg-main);
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s;
            box-shadow: 0 0 5px rgba(16, 185, 129, 0.4);
        }
        .agent-node.inactive .agent-toggle-btn {
            background: #ef4444;
            box-shadow: 0 0 5px rgba(239, 68, 68, 0.4);
        }

        @keyframes glow { from { opacity: 0.7; } to { opacity: 1; } }

        .node-emoji { font-size: 1.2rem; }
        .node-name {
            position: absolute; bottom: -20px; font-size: 0.6rem; color: var(--text-muted);
            white-space: nowrap; pointer-events: none;
        }
        .node-prof {
            position: absolute; top: -12px; background: var(--neon-green); color: black;
            padding: 1px 4px; border-radius: 8px; font-size: 0.55rem; font-weight: 900;
        }

        /* Power Controls */
        .power-btn-system {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: #10b981;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.6rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: 10px;
        }
        .power-btn-system.off { color: #ef4444; border-color: #ef4444; }

        /* Data Flow Sparks */
        .spark-particle {
            fill: #3b82f6; 
            filter: drop-shadow(0 0 5px #3b82f6);
            pointer-events: none;
        }

        /* Tópicos e Blocos de Código (Matrix Theme) */
        .msg-bubble h3 { font-size: 0.85rem; color: #3b82f6; margin: 8px 0 4px 0; border-bottom: 1px solid rgba(59, 130, 246, 0.2); }
        .msg-bubble pre { 
            background: rgba(0, 0, 0, 0.3); 
            border: 1px solid #3b82f6; 
            border-radius: 4px; 
            padding: 8px; 
            margin: 8px 0; 
            font-family: 'Courier New', Courier, monospace; 
            color: #60a5fa; 
            overflow-x: auto; 
            font-size: 0.7rem;
            box-shadow: inset 0 0 10px rgba(59, 130, 246, 0.1);
        }
        .msg-bubble code { color: #93c5fd; }

        /* Chat Panels */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.1);
            border-top: 1px solid var(--glass-border);
            overflow: hidden;
        }
        .chat-logs {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .chat-logs::-webkit-scrollbar { width: 4px; }
        .chat-logs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .msg-bubble {
            background: var(--bg-panel);
            padding: 10px; border-radius: 12px;
            font-size: 0.75rem; line-height: 1.4;
            max-width: 85%; align-self: flex-start;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border: 1px solid var(--glass-border);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-author { font-weight: 800; font-size: 0.65rem; margin-bottom: 4px; color: var(--text-muted); }
        .msg-bubble.is-helper { align-self: flex-end; border-color: var(--anim-primary); }
        .pokemons-side .msg-bubble.is-helper { border-color: var(--poke-primary); }

        .refinement-note {
            font-size: 0.65rem; color: #fbbf24; font-style: italic; padding: 5px 10px;
            background: rgba(245, 158, 11, 0.05); border-radius: 6px; margin-bottom: 10px;
            border-left: 2px solid #fbbf24;
        }

        .status-footer {
            position: fixed; bottom: 10px; left: 10px;
            font-size: 0.65rem; color: var(--text-muted); display: flex; align-items: center; gap: 5px;
        }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: #ef4444; }
        .dot.online { background: #10b981; box-shadow: 0 0 5px #10b981; }

 
        /* Floating Interview Chat */
        .interview-modal {
            position: fixed;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 2px solid var(--anim-primary);
            border-radius: 12px;
            width: 320px;
            z-index: 5000; /* Prioridade máxima */
            display: none;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            animation: fadeIn 0.3s ease-out;
        }
        .interview-header {
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .interview-body {
            height: 180px;
            overflow-y: auto;
            padding: 10px;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .interview-footer {
            padding: 10px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 5px;
        }
        .interview-input {
            flex: 1;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 5px;
            border-radius: 4px;
            font-size: 0.75rem;
        }
        .interview-msg {
            padding: 6px 10px;
            border-radius: 10px;
            max-width: 90%;
            word-wrap: break-word;
            font-size: 0.75rem;
        }
        .msg-user { background: rgba(59, 130, 246, 0.4); align-self: flex-end; border: 1px solid var(--anim-primary); color: #fff; }
        .msg-agent { background: rgba(255, 255, 255, 0.1); align-self: flex-start; border: 1px solid var(--glass-border); color: #fff; }

        /* API Configuration Modal */
        .api-modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #1e293b;
            border: 2px solid #3b82f6;
            border-radius: 12px;
            width: 450px;
            padding: 20px;
            z-index: 3000;
            display: none;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
        }
        .api-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .api-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .api-row label { flex: 1; font-size: 0.85rem; }
        .api-row input[type="text"], .api-row input[type="password"] {
            flex: 2; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
            color: white; padding: 6px; border-radius: 4px; font-size: 0.8rem;
        }
        .api-row .checkbox-group { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; }

        /* Log Colors */
        .msg-system-info { color: #00f3ff; }
        .msg-system-success { color: #10b981; }
        .msg-system-error { color: #ef4444; font-weight: bold; }
        .msg-system-warning { color: #f59e0b; }

        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -45%); } to { opacity: 1; transform: translate(-50%, -50%); } }

    </style>
</head>
<body>

    <header class="header">
        <div style="font-weight: 900; font-size: 0.9rem;">IAG <span style="color:var(--anim-primary)">MATRIX</span> v3.0</div>
        <div class="input-group">
            <input type="password" id="apiKey" placeholder="Gemini API Key" style="width: 140px;">
            <input type="text" id="topic" placeholder="Tópico de Pesquisa Global..." style="width: 200px;">
            <button class="btn" onclick="openApiModal()" style="background: transparent; border: 1px solid var(--anim-primary); color: var(--anim-primary); margin-right: 5px;">⚙️ Configurar APIs</button>
            <button class="btn" onclick="startLearning()">▶ INICIAR</button>
            <button class="btn btn-stop" onclick="stopMatrix()">■ PARAR</button>
        </div>
        <div onclick="toggleTheme()" style="cursor:pointer; opacity: 0.6;">🌗</div>
    </header>

    <!-- Fusion Button Center -->
    <div class="fusion-center">
        <button class="btn-sync" onclick="syncSystems()">🔗 SINCRONIZAR SISTEMAS</button>
    </div>

    <main class="main-dashboard">
        <!-- Lado dos Animais -->
        <section class="system-column animals-side">
            <div class="system-header">
                <div style="display: flex; gap: 5px; align-items: center;">
                    <button class="btn-micro" onclick="startLearning('animals')">DISPARAR</button>
                    <label class="btn-micro" title="Anexar Arquivo para Animais">
                        📂 <input type="file" id="file-animals" hidden onchange="handleFile(event, 'animals')">
                    </label>
                    <span id="label-animals" style="font-size: 0.6rem; color: #10b981; max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
                </div>
                <span>CÓRTEX SELVAGEM <small style="opacity:0.5; font-size: 0.6rem;">v2.5</small></span>
                <button class="power-btn-system" id="btn-pwr-animals" onclick="toggleSystemPower('animals')">ON</button>
            </div>
            <div class="graph-wrapper" id="area-animals">
                <svg class="graph-svg" id="svg-animals"></svg>
                <div class="central-node">CORE</div>
            </div>
            <div class="chat-panel">
                <div class="chat-logs" id="chat-animals">
                    <div class="refinement-note">Aguardando sinais bio-digitais...</div>
                </div>
            </div>
            <div class="panel-footer">
                <div class="control-row">
                    <input type="text" id="query-animals" placeholder="Pergunta para Córtex...">
                    <input type="text" id="url-animals" placeholder="URL para analisar...">
                </div>
                <div class="control-row">
                    <button class="btn btn-search" style="flex:2" onclick="panelSearch('animals')">🔍 BUSCAR</button>
                    <label class="btn btn-upload" style="flex:1; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                        📂 UPLOAD <input type="file" id="file-animals" hidden onchange="handleFile(event, 'animals')">
                    </label>
                </div>
            </div>
        </section>

        <!-- Lado dos Pokemons -->
        <section class="system-column pokemons-side">
            <div class="system-header">
                <div style="display: flex; gap: 5px; align-items: center;">
                    <button class="btn-micro" onclick="startLearning('pokemons')">DISPARAR</button>
                    <label class="btn-micro" title="Anexar Arquivo para Pokemons">
                        📂 <input type="file" id="file-pokemons" hidden onchange="handleFile(event, 'pokemons')">
                    </label>
                    <span id="label-pokemons" style="font-size: 0.6rem; color: #a78bfa; max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
                </div>
                <span>NEXO ELEMENTAL <small style="opacity:0.5; font-size: 0.6rem;">v1.0</small></span>
                <button class="power-btn-system" id="btn-pwr-pokemons" onclick="toggleSystemPower('pokemons')">ON</button>
            </div>
            <div class="graph-wrapper" id="area-pokemons">
                <svg class="graph-svg" id="svg-pokemons"></svg>
                <div class="central-node">NEXUS</div>
            </div>
            <div class="chat-panel">
                <div class="chat-logs" id="chat-pokemons">
                    <div class="refinement-note">Sintonizando frequencias elementares...</div>
                </div>
            </div>
            <div class="panel-footer">
                <div class="control-row">
                    <input type="text" id="query-pokemons" placeholder="Pergunta para Nexo...">
                    <input type="text" id="url-pokemons" placeholder="URL para analisar...">
                </div>
                <div class="control-row">
                    <button class="btn btn-search" style="flex:2; background: #00f3ff;" onclick="panelSearch('pokemons')">🔍 BUSCAR</button>
                    <label class="btn btn-upload" style="flex:1; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                        📂 UPLOAD <input type="file" id="file-pokemons" hidden onchange="handleFile(event, 'pokemons')">
                    </label>
                </div>
            </div>
        </section>
    </main>

    <div class="status-footer">
        <div class="dot" id="status-dot"></div>
        <span id="status-text">DISCONNECTED</span>
    </div>

    <div id="apiModal" class="api-modal">
        <div class="api-modal-header">
            <h3 style="font-size: 1rem;">⚙️ Configuração de APIs de IA</h3>
            <button class="btn-micro" onclick="closeApiModal()">X</button>
        </div>
        <div class="api-row">
            <label>🤖 Google Gemini</label>
            <input type="password" id="api-gemini" placeholder="Cole sua API Key aqui">
            <div class="checkbox-group"><input type="checkbox" id="api-gemini-active" checked> Ativo</div>
        </div>
        <div class="api-row">
            <label>🧠 OpenAI GPT-4</label>
            <input type="password" id="api-openai" placeholder="sk-...">
            <div class="checkbox-group"><input type="checkbox" id="api-openai-active"> Ativo</div>
        </div>
        <div class="api-row">
            <label>🎯 Anthropic Claude</label>
            <input type="password" id="api-anthropic" placeholder="sk-ant-...">
            <div class="checkbox-group"><input type="checkbox" id="api-anthropic-active"> Ativo</div>
        </div>
        <div class="api-row">
            <label>🎆 Hugging Face</label>
            <input type="password" id="api-hugging" placeholder="hf_...">
            <div class="checkbox-group"><input type="checkbox" id="api-hugging-active"> Ativo</div>
        </div>
        <button class="btn" style="width: 100%; margin-top: 10px;" onclick="saveApiConfigs()">💾 SALVAR CONFIGURAÇÕES</button>
    </div>
    <div id="interviewModal" class="interview-modal">
        <div class="interview-header">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span id="interviewTitle">Comunicação</span>
                <button id="btn-pwr-chat" class="power-btn-system" style="margin: 0; padding: 1px 6px; font-size: 0.55rem;">ON</button>
            </div>
            <button class="btn-micro" onclick="closeInterview()">X</button>
        </div>
        <div id="interviewBody" class="interview-body"></div>
        <div class="interview-footer">
            <input type="text" id="interviewInput" class="interview-input" placeholder="Pergunte algo..." onkeydown="if(event.key==='Enter') sendInterview()">
            <button class="btn-micro" onclick="sendInterview()">➤</button>
        </div>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        let ws = null;
        let agentsDict = { animals: {}, pokemons: {} };
        let uploads = { animals: null, pokemons: null };
        let isMatrixRunning = false;
        let currentCycle = 0;

        function toggleTheme() {
            const html = document.documentElement;
            const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('iag_theme', newTheme);
        }

        function getEmoji(name, system) {
            const animalMap = {
                'Leao': '🦁', 'Tigre': '🐅', 'Elefante': '🐘', 'HipoAgent': '🦛', 'PolvoAgent': '🐙', 'LoboAgent': '🐺',
                'TubaraoAgent': '🦈', 'OrcaAgent': '🐋', 'RinoceronteAgent': '🦏', 'FalcaoAgent': '🦅', 'CrocodiloAgent': '🐊',
                'CavaloAgent': '🐎', 'GorilaAgent': '🦍', 'OvelhaAgent': '🐑', 'CarneiroAgent': '🐏', 'CoelhoAgent': '🐇',
                'AlceAgent': '🦌', 'MarlinAgent': '🐟', 'UrsoPardoAgent': '🐻', 'LeopardoAgent': '🐆', 'CanguruAgent': '🦘', 'BisaoAgent': '🦬'
            };
            const pokeMap = {
                'Pyroar': '🦁', 'Incineroar': '🐅', 'Copperajah': '🐘', 'Hippowdon': '🦛', 'Octillery': '🐙',
                'Lycanroc': '🐺', 'Garchomp': '🦈', 'Kyogre': '🐋', 'Rhyperior': '🦏', 'Talonflame': '🦅',
                'Feraligatr': '🐊', 'Rapidash': '🐎', 'Rillaboom': '🦍', 'Wooloo': '🐑', 'Dubwool': '🐏',
                'Cinderace': '🐇', 'Stantler': '🦌', 'Barraskewda': '🐟', 'Ursaring': '🐻', 'Liepard': '🐆',
                'Kangaskhan': '🦘', 'Bouffalant': '🦬'
            };
            return (system === 'animals' ? animalMap[name] : pokeMap[name]) || '✨';
        }

        function connect() {
            const host = window.location.host || 'localhost:8000';
            ws = new WebSocket(`ws://${host}/ws`);

            ws.onopen = () => {
                document.getElementById('status-dot').className = 'dot online';
                document.getElementById('status-text').textContent = 'MATRIX ONLINE';
            };

            ws.onclose = () => {
                document.getElementById('status-dot').className = 'dot';
                document.getElementById('status-text').textContent = 'RECONNECTING...';
                setTimeout(connect, 3000);
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                handleMessage(msg);
            };
        }

        function handleFile(event, system) {
            const file = event.target.files[0];
            const label = document.getElementById(`label-${system}`);
            if (file) {
                label.textContent = file.name;
                const reader = new FileReader();
                reader.onload = (e) => { uploads[system] = e.target.result; };
                file.name.toLowerCase().endsWith('.pdf') ? reader.readAsDataURL(file) : reader.readAsText(file);
            }
        }

        function handleMessage(msg) {
            console.log("Recebido:", msg);
            if (msg.type === 'init') {
                initGraph(msg.animals, 'animals', '#svg-animals', 'area-animals');
                initGraph(msg.pokemons, 'pokemons', '#svg-pokemons', 'area-pokemons');
                
                if (msg.systems_active) {
                    Object.keys(msg.systems_active).forEach(sys => {
                        const active = msg.systems_active[sys];
                        const btn = document.getElementById(`btn-pwr-${sys}`);
                        const column = document.querySelector(`.${sys}-side`);
                        if (btn) {
                            btn.classList.toggle('off', !active);
                            btn.textContent = active ? "ON" : "OFF";
                        }
                        if (column) column.classList.toggle('off', !active);
                    });
                }
            } else if (msg.type === 'learning' || msg.type === 'learning_update') {
                updateNode(msg.agent_id, msg.system, msg.proficiency || msg.new_proficiency, msg.type === 'learning');
            } else if (msg.type === 'conversation' || msg.type === 'system') {
                if (msg.cycle) {
                    currentCycle = msg.cycle;
                    document.getElementById('topic').placeholder = `Ciclo de Evolução #${currentCycle}`;
                }
                addChat(msg);
            } else if (msg.type === 'refinement') {
                addRefinement(msg);
            } else if (msg.type === 'agent_status') {
                const node = document.getElementById(`node-${msg.system}-${msg.agent_id}`);
                if (node) node.classList.toggle('inactive', !msg.active);
            } else if (msg.type === 'data_flow') {
                if (msg.active) {
                    startDataFlow(msg.agent_id, msg.system);
                } else {
                    stopDataFlow(msg.agent_id, msg.system);
                }
            } else if (msg.type === 'system_status') {
                const btn = document.getElementById(`btn-pwr-${msg.system}`);
                const column = document.querySelector(`.${msg.system}-side`);
                if (btn) {
                    btn.classList.toggle('off', !msg.active);
                    btn.textContent = msg.active ? "ON" : "OFF";
                }
                if (column) {
                    column.classList.toggle('off', !msg.active);
                }
            } else if (msg.type === 'agent_response') {
                handleAgentResponse(msg);
            }
        }

        function initGraph(agents, sysName, svgId, areaId) {
            const area = document.getElementById(areaId);
            const svg = d3.select(svgId);
            
            // Garantir dimensões robustas
            const rect = area.getBoundingClientRect();
            let w = rect.width || area.clientWidth;
            let h = rect.height || area.clientHeight;
            
            // Fallback para evitar amontoamento (0,0) se renderização ainda não ocorreu
            if (w < 100) {
                console.warn(`[GRAPH] Dimensões inválidas para ${sysName}, tentando novamente em 200ms...`);
                setTimeout(() => initGraph(agents, sysName, svgId, areaId), 200);
                return;
            }

            const midX = w / 2;
            const midY = h / 2;
            const minDim = Math.min(w, h);

            svg.selectAll("*").remove();
            area.querySelectorAll('.agent-node').forEach(n => n.remove());

            // Background Decorative Rings (v2.5 pattern)
            [0.18, 0.35, 0.52].forEach(r => {
                svg.append("circle")
                    .attr("cx", midX).attr("cy", midY)
                    .attr("r", minDim * r * 0.7)
                    .attr("stroke", "rgba(255,255,255,0.03)")
                    .attr("fill", "none");
            });

            // Split layers: Inner (6), Outer (Rest) - Aumentando raios para evitar amontoamento
            const layers = [
                { items: agents.slice(0, 6), radius: minDim * 0.25 },
                { items: agents.slice(6), radius: minDim * 0.45 }
            ];

            layers.forEach((layer, layerIdx) => {
                const total = layer.items.length;
                layer.items.forEach((agent, i) => {
                    const angle = (i / total) * 2 * Math.PI - (Math.PI / 2);
                    const x = midX + layer.radius * Math.cos(angle);
                    const y = midY + layer.radius * Math.sin(angle);

                    svg.append("line")
                        .attr("x1", midX).attr("y1", midY)
                        .attr("x2", x).attr("y2", y)
                        .attr("stroke", "rgba(255,255,255,0.04)")
                        .attr("id", `link-${sysName}-${agent.id}`);

                    const node = document.createElement('div');
                    node.className = 'agent-node';
                    if (agent.active === false) node.classList.add('inactive');
                    
                    node.id = `node-${sysName}-${agent.id}`;
                    node.style.left = `${x}px`;
                    node.style.top = `${y}px`;
                    node.style.width = layerIdx === 0 ? '44px' : '36px'; 
                    node.style.height = layerIdx === 0 ? '44px' : '36px';
                    
                    node.innerHTML = `
                        <div class="node-prof" id="prof-${sysName}-${agent.id}">${Math.round((agent.proficiency || 0)*100)}%</div>
                        <div class="node-emoji">${getEmoji(agent.animal, sysName)}</div>
                        <div class="node-name" style="font-size: ${layerIdx === 0 ? '0.65rem' : '0.55rem'}">${agent.animal}</div>
                        <div class="agent-toggle-btn" onclick="toggleAgentPowerOnNode('${sysName}', '${agent.id}', event)"></div>
                    `;
                    node.onclick = (e) => {
                        if (!e.target.classList.contains('agent-toggle-btn')) {
                            openInterview(e, agent.id, agent.animal, sysName);
                        }
                    };
                    area.appendChild(node);
                });
            });
        }

        function toggleAgentPowerOnNode(sysName, agentId, event) {
            event.stopPropagation();
            toggleAgentPower(sysName, agentId);
        }

        function updateNode(id, system, prof, active) {
            const node = document.getElementById(`node-${system}-${id}`);
            const profText = document.getElementById(`prof-${system}-${id}`);
            if (node) {
                node.classList.toggle('active-learning', active);
                // Garantia contra proficiência nula ou elementos ausentes
                if (profText) {
                    const pValue = prof !== undefined ? prof : 0;
                    profText.textContent = `${Math.round(pValue * 100)}%`;
                }
            }
        }

        function addChat(data) {
            const cont = document.getElementById(`chat-${data.system}`);
            const note = cont.querySelector('.refinement-note');
            if (note) note.remove();

            const bubble = document.createElement('div');
            bubble.className = `msg-bubble ${data.is_helper ? 'is-helper' : ''}`;
            
            let colorClass = "";
            if (data.message.includes("✅") || data.message.includes("sucesso")) colorClass = "msg-system-success";
            if (data.message.includes("❌") || data.message.includes("ERRO")) colorClass = "msg-system-error";
            if (data.message.includes("🔄") || data.message.includes("INICIANDO")) colorClass = "msg-system-info";

            bubble.innerHTML = `
                <div class="msg-author">${data.from_agent || 'SISTEMA'}</div>
                <div class="${colorClass}">${data.message}</div>
            `;
            cont.appendChild(bubble);
            cont.scrollTop = cont.scrollHeight;
        }

        // Modal Functions
        function openApiModal() { document.getElementById('apiModal').style.display = 'block'; }
        function closeApiModal() { document.getElementById('apiModal').style.display = 'none'; }
        
        function saveApiConfigs() {
            const config = {
                gemini: { key: document.getElementById('api-gemini').value, active: document.getElementById('api-gemini-active').checked },
                openai: { key: document.getElementById('api-openai').value, active: document.getElementById('api-openai-active').checked },
                anthropic: { key: document.getElementById('api-anthropic').value, active: document.getElementById('api-anthropic-active').checked },
                hugging: { key: document.getElementById('api-hugging').value, active: document.getElementById('api-hugging-active').checked }
            };
            localStorage.setItem('iag_api_config', JSON.stringify(config));
            if (config.gemini.key) document.getElementById('apiKey').value = config.gemini.key;
            alert("Configurações salvas localmente!");
            closeApiModal();
        }

        // Load configs
        window.onload = () => {
             const saved = localStorage.getItem('iag_api_config');
             if (saved) {
                 const cfg = JSON.parse(saved);
                 document.getElementById('api-gemini').value = cfg.gemini.key || "";
                 document.getElementById('api-gemini-active').checked = cfg.gemini.active;
                 if (cfg.gemini.key) document.getElementById('apiKey').value = cfg.gemini.key;
             }
        };

        function addRefinement(data) {
            const cont = document.getElementById(`chat-${data.system}`);
            const div = document.createElement('div');
            div.className = 'refinement-note';
            div.innerHTML = `[MODULACAO] ${data.message}`;
            cont.appendChild(div);
            cont.scrollTop = cont.scrollHeight;
            setTimeout(() => div.remove(), 10000);
        }

        function startLearning(targetSystem = null) {
            const topicInput = document.getElementById('topic');
            const topic = topicInput.value.trim();
            const key = document.getElementById('apiKey').value.trim();
            const mainBtn = document.querySelector('.header .btn:nth-child(2)');

            if (isMatrixRunning && !targetSystem) return alert("Matrix já está em execução.");

            if (!topic && !targetSystem) return alert("Defina um tópico!");
            const systems = targetSystem ? [targetSystem] : ['animals', 'pokemons'];
            
            if (!targetSystem) {
                isMatrixRunning = true;
                mainBtn.style.opacity = "0.5";
                currentCycle = 0;
                addChat({ system: 'animals', message: "🚀 Matrix Ativada - Todos sistemas online", from_agent: "SISTEMA" });
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                systems.forEach(sys => {
                    const content = uploads[sys] || `Expertise sobre ${topic}`;
                    ws.send(JSON.stringify({
                        action: 'start_learning',
                        task: topic || "Auto-Evolução",
                        content: content,
                        api_keys: { gemini_key: key },
                        target_system: sys
                    }));
                });
            }
        }

        function stopMatrix() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'stop_learning', target_system: null }));
                isMatrixRunning = false;
                document.querySelector('.header .btn:nth-child(2)').style.opacity = "1";
            }
        }

        function syncSystems() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'sync_systems' }));
            }
        }

        function panelSearch(sys) {
            const query = document.getElementById(`query-${sys}`).value;
            const url = document.getElementById(`url-${sys}`).value;
            const key = document.getElementById('apiKey').value;

            if (!query && !url) return alert("Digite uma pergunta ou URL.");
            
            addChat({ system: sys, message: `🔍 Buscando: "${query || url}"...`, from_agent: "SISTEMA" });
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    action: 'start_learning',
                    task: query || "Análise de URL",
                    content: url ? `Analisar conteúdo de: ${url}` : query,
                    api_keys: { gemini_key: key },
                    target_system: sys
                }));
            }
        }

        let currentAgent = null;
        function openInterview(event, id, animal, system) {
            currentAgent = { id, animal, system };
            const modal = document.getElementById('interviewModal');
            const btnChat = document.getElementById('btn-pwr-chat');
            const node = document.getElementById(`node-${system}-${id}`);
            
            document.getElementById('interviewTitle').textContent = `Comunicação: ${animal}`;
            document.getElementById('interviewBody').innerHTML = '';

            // Sincronizar estado real do nó com o botão do modal
            if (btnChat && node) {
                const isActive = !node.classList.contains('inactive');
                btnChat.classList.toggle('off', !isActive);
                btnChat.textContent = isActive ? "ON" : "OFF";
                // Corrigir a função de clique do botão no modal
                btnChat.onclick = (e) => {
                    e.stopPropagation();
                    toggleAgentPower(system, id);
                    // Atualizar o botão do modal localmente após o clique para feedback instantâneo
                    const newActive = btnChat.classList.contains('off'); // Inverteu no toggle do server
                    btnChat.classList.toggle('off');
                    btnChat.textContent = btnChat.classList.contains('off') ? "OFF" : "ON";
                };
            }
            
            // Posicionar modal perto do clique mas dentro da tela
            let posX = event.clientX + 20;
            let posY = event.clientY - 100;
            
            if (posX + 320 > window.innerWidth) posX = window.innerWidth - 340;
            if (posY + 400 > window.innerHeight) posY = window.innerHeight - 420;
            if (posY < 0) posY = 20;

            modal.style.left = `${posX}px`;
            modal.style.top = `${posY}px`;
            modal.style.display = 'flex';
            
            addInterviewMsg(`🐾 Olá! Eu sou o ${animal}. O que você deseja me perguntar sobre nossa missão ou programação?`, 'agent'); // Fallback local
        }

        function closeInterview() {
            document.getElementById('interviewModal').style.display = 'none';
            currentAgent = null;
        }

        function sendInterview() {
            const input = document.getElementById('interviewInput');
            const msg = input.value.trim();
            if (!msg || !currentAgent) return;

            addInterviewMsg(msg, 'user');
            input.value = '';

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    action: 'direct_chat',
                    agent_id: currentAgent.id,
                    system: currentAgent.system,
                    message: msg,
                    api_keys: { gemini_key: document.getElementById('apiKey').value.trim() }
                }));
            }
        }

        function addInterviewMsg(text, sender) {
            const body = document.getElementById('interviewBody');
            const div = document.createElement('div');
            div.className = `interview-msg msg-${sender}`;
            div.textContent = text;
            body.appendChild(div);
            body.scrollTop = body.scrollHeight;
        }

        function toggleSystemPower(system) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'toggle_system', system: system }));
            }
        }

        function toggleAgentPower(system, id) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'toggle_agent', system: system, agent_id: id }));
            }
        }

        function handleAgentResponse(data) {
            if (currentAgent && currentAgent.id === data.agent_id) {
                addInterviewMsg(data.message, 'agent');
            } else {
                addChat({ ...data, from_agent: `[ENTREVISTA] ${data.animal}`, is_helper: false });
            }
        }

        const flowIntervals = {};

        function startDataFlow(agentId, system) {
            const key = `${system}-${agentId}`;
            if (flowIntervals[key]) return;

            const svg = d3.select(system === 'animals' ? '#svg-animals' : '#svg-pokemons');
            const line = svg.select(`#link-${system}-${agentId}`);
            if (line.empty()) return;

            const xOrigin = +line.attr('x1');
            const yOrigin = +line.attr('y1');
            const xDest = +line.attr('x2');
            const yDest = +line.attr('y2');

            flowIntervals[key] = setInterval(() => {
                const dot = svg.append('circle')
                    .attr('class', 'spark-particle')
                    .attr('r', 2)
                    .attr('cx', xOrigin)
                    .attr('cy', yOrigin);

                dot.transition()
                    .duration(1200)
                    .attr('cx', xDest)
                    .attr('cy', yDest)
                    .on('end', function() {
                        d3.select(this)
                            .transition()
                            .duration(1200)
                            .attr('cx', xOrigin)
                            .attr('cy', yOrigin)
                            .remove();
                    });
            }, 300);
        }

        function stopDataFlow(agentId, system) {
            const key = `${system}-${agentId}`;
            if (flowIntervals[key]) {
                clearInterval(flowIntervals[key]);
                delete flowIntervals[key];
            }
        }

        function addChat(msg) {
            const side = msg.system === 'animals' ? 'animals' : 'pokemons';
            const logs = document.getElementById(`logs-${side}`);
            if (!logs) return;

            const bubble = document.createElement('div');
            bubble.className = `msg-bubble ${msg.is_helper ? 'is-helper' : ''}`;
            
            let content = msg.message;
            content = content.replace(/### (.*?)\n/g, '<h3>$1</h3>');
            content = content.replace(/```(.*?)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            content = content.replace(/\* (.*?)\n/g, '• $1<br>');

            bubble.innerHTML = `
                <div class="msg-author">${msg.from_agent || 'SISTEMA'}</div>
                <div class="msg-text">${content}</div>
            `;
            logs.appendChild(bubble);
            logs.scrollTop = logs.scrollHeight;
        }

        window.onload = () => { connect(); };
    </script>
