<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAG MATRIX - Sistema Híbrido</title>
    <style>
        :root {
            --bg-dark: #0b1120;
            --panel-bg: #151e32;
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-green: #00ff88;
            --text-color: #e0e6ed;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #0b1120 0%, #1a1f3a 100%); 
            color: var(--text-color); 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        /* Header */
        header {
            height: 70px; 
            background: rgba(5, 8, 15, 0.95); 
            border-bottom: 2px solid #333;
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 30px;
            backdrop-filter: blur(10px);
        }

        .logo { 
            font-weight: bold; 
            font-size: 1.5rem; 
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--neon-blue);
        }
        .logo span { color: var(--neon-blue); }

        .top-controls { 
            display: flex; 
            gap: 15px; 
            align-items: center; 
        }

        input[type="text"], input[type="password"] { 
            background: rgba(26, 37, 58, 0.8); 
            border: 1px solid #444; 
            color: white; 
            padding: 10px 15px; 
            border-radius: 5px;
            font-size: 0.9rem;
        }

        button { 
            cursor: pointer; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            font-weight: bold; 
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .btn-primary { 
            background: linear-gradient(135deg, var(--neon-blue), #0099ff); 
            color: #000;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(0, 243, 255, 0.6); }

        .btn-danger { 
            background: linear-gradient(135deg, #ff3366, #ff0033); 
            color: white;
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.4);
        }
        .btn-danger:hover { transform: translateY(-2px); }

        .btn-sync { 
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); 
            color: white;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.4);
        }

        /* Main Container */
        .matrix-container {
            flex: 1; 
            display: flex; 
            position: relative;
        }

        .side-panel {
            flex: 1; 
            position: relative; 
            border-right: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            padding: 0 20px;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .panel-title { 
            font-weight: bold; 
            letter-spacing: 4px; 
            font-size: 1rem;
            text-shadow: 0 0 10px currentColor;
        }
        .cortex .panel-title { color: var(--neon-blue); }
        .nexo .panel-title { color: var(--neon-purple); }

        .system-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 25px;
            background: #333;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle-switch.active {
            background: var(--neon-green);
        }

        .toggle-slider {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 19px;
            height: 19px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }

        .toggle-switch.active .toggle-slider {
            left: 28px;
        }

        /* Graph Area - Radial Layout */
        .graph-area {
            flex: 1; 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            background: radial-gradient(circle at center, rgba(26, 37, 58, 0.5) 0%, transparent 70%);
        }

        .core-circle {
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 10;
            position: absolute;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            border: 3px solid;
        }

        .cortex .core-circle { 
            background: radial-gradient(circle, #0066ff, #001a33);
            border-color: var(--neon-blue); 
            box-shadow: 0 0 30px var(--neon-blue);
            color: white;
        }

        .nexo .core-circle { 
            background: radial-gradient(circle, #6600ff, #1a0033);
            border-color: var(--neon-purple); 
            box-shadow: 0 0 30px var(--neon-purple);
            color: white;
        }

        /* Agent Nodes */
        .agent-node {
            position: absolute; 
            width: 60px; 
            height: 60px; 
            border-radius: 50%;
            background: rgba(34, 34, 34, 0.9);
            border: 2px solid #444;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            font-size: 0.65rem; 
            cursor: pointer;
            transition: all 0.3s;
            z-index: 5;
            backdrop-filter: blur(5px);
        }

        .agent-node:hover {
            transform: scale(1.1);
            z-index: 6;
        }

        .agent-node.active { 
            border-color: var(--neon-green); 
            box-shadow: 0 0 15px var(--neon-green);
            background: rgba(0, 255, 136, 0.1);
        }

        .agent-node.disabled { 
            opacity: 0.3; 
            filter: grayscale(1);
        }

        .agent-icon {
            font-size: 1.5rem;
            margin-bottom: 2px;
        }

        .agent-name {
            font-size: 0.6rem;
            text-align: center;
            max-width: 50px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .agent-toggle-btn {
            position: absolute; 
            bottom: -8px; 
            width: 18px; 
            height: 18px; 
            border-radius: 50%;
            background: #333; 
            border: 2px solid #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            z-index: 7;
        }

        .agent-toggle-btn.on { 
            background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
        }

        /* Bottom Controls */
        .bottom-controls {
            height: 200px; 
            background: rgba(13, 18, 31, 0.95);
            border-top: 2px solid rgba(255,255,255,0.1);
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            backdrop-filter: blur(10px);
        }

        .control-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .control-row input[type="text"] {
            flex: 1;
        }

        .log-box {
            flex: 1; 
            background: rgba(0, 0, 0, 0.8); 
            border: 1px solid #333; 
            color: var(--neon-green); 
            font-family: 'Courier New', monospace;
            padding: 10px; 
            font-size: 0.85rem; 
            overflow-y: auto;
            border-radius: 5px;
        }

        .log-box div {
            margin-bottom: 5px;
            padding: 3px;
            border-left: 3px solid var(--neon-blue);
            padding-left: 10px;
        }

        /* Modal */
        .modal-overlay {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0,0,0,0.9); 
            z-index: 100; 
            align-items: center; 
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal { 
            background: linear-gradient(135deg, #1a253a, #0f1525); 
            padding: 30px; 
            border-radius: 10px; 
            width: 500px; 
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.3);
        }

        .modal h2 { 
            margin-bottom: 20px; 
            color: var(--neon-blue);
            text-align: center;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .api-row { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 15px; 
            align-items: center;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 5px;
        }

        .api-row input[type="text"] {
            flex: 1;
            margin-right: 10px;
        }

        .close-modal { 
            float: right; 
            cursor: pointer; 
            font-size: 1.5rem;
            color: #fff;
        }

        /* Sync Button Center */
        .sync-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .agent-node.active .agent-icon {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">IAG <span>MATRIX</span> v3.0</div>
        <div class="top-controls">
            <input type="password" id="apiKeyInput" placeholder="🔑 API Key">
            <input type="text" id="globalQuery" placeholder="🔍 Tópico de Pesquisa Global...">
            <button class="btn-primary" onclick="openApiModal()">⚙️ Configurar APIs</button>
            <button class="btn-primary" onclick="startMatrix()">▶ INICIAR</button>
            <button class="btn-danger" onclick="stopMatrix()">⏹ PARAR</button>
        </div>
    </header>

    <div class="sync-overlay">
        <button class="btn-sync" onclick="syncSystems()" style="padding: 15px 30px; font-size: 1rem;">
            🔗 SINCRONIZAR SISTEMAS
        </button>
    </div>

    <div class="matrix-container">
        <!-- Cortex Selvagem -->
        <div class="side-panel cortex" id="cortexPanel">
            <div class="panel-header">
                <span class="panel-title">CÓRTEX SELVAGEM</span>
                <div class="system-toggle">
                    <span id="cortexStatus">ON</span>
                    <div class="toggle-switch active" onclick="toggleSystem('cortex')"></div>
                </div>
            </div>
            <div class="graph-area" id="cortexGraph">
                <div class="core-circle">CORE</div>
            </div>
            <div class="bottom-controls">
                <div class="control-row">
                    <input type="text" id="cortexQuery" placeholder="Pergunta para Cortex...">
                    <input type="text" id="cortexURL" placeholder="URL para analisar...">
                    <button class="btn-primary" onclick="research('cortex')">🔍 BUSCAR</button>
                    <label class="btn-primary" style="padding: 10px 15px; cursor: pointer;">
                        📂 UPLOAD
                        <input type="file" id="cortexFile" style="display:none" onchange="uploadFile(this, 'cortex')">
                    </label>
                </div>
                <div class="log-box" id="cortexLog">
                    <div>{ Aguardando sinais bio-digitais... }</div>
                </div>
            </div>
        </div>

        <!-- Nexo Elemental -->
        <div class="side-panel nexo" id="nexoPanel">
            <div class="panel-header">
                <span class="panel-title">NEXO ELEMENTAL</span>
                <div class="system-toggle">
                    <span id="nexoStatus">ON</span>
                    <div class="toggle-switch active" onclick="toggleSystem('nexo')"></div>
                </div>
            </div>
            <div class="graph-area" id="nexoGraph">
                <div class="core-circle">NEXUS</div>
            </div>
            <div class="bottom-controls">
                <div class="control-row">
                    <input type="text" id="nexoQuery" placeholder="Pergunta para Nexo...">
                    <input type="text" id="nexoURL" placeholder="URL para analisar...">
                    <button class="btn-primary" onclick="research('nexo')">🔍 BUSCAR</button>
                    <label class="btn-primary" style="padding: 10px 15px; cursor: pointer;">
                        📂 UPLOAD
                        <input type="file" id="nexoFile" style="display:none" onchange="uploadFile(this, 'nexo')">
                    </label>
                </div>
                <div class="log-box" id="nexoLog">
                    <div>{ Sintonizando frequências elementares... }</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de APIs -->
    <div class="modal-overlay" id="apiModal">
        <div class="modal">
            <span class="close-modal" onclick="closeApiModal()">&times;</span>
            <h2>⚙️ Configuração de APIs de IA</h2>
            <div class="api-row">
                <span>🤖 Google Gemini</span>
                <input type="text" placeholder="Cole sua API Key aqui">
                <label><input type="checkbox" checked> Ativo</label>
            </div>
            <div class="api-row">
                <span>🧠 OpenAI GPT-4</span>
                <input type="text" placeholder="sk-...">
                <label><input type="checkbox"> Ativo</label>
            </div>
            <div class="api-row">
                <span>🎯 Anthropic Claude</span>
                <input type="text" placeholder="sk-ant-...">
                <label><input type="checkbox"> Ativo</label>
            </div>
            <div class="api-row">
                <span>🔮 Hugging Face</span>
                <input type="text" placeholder="hf_...">
                <label><input type="checkbox"> Ativo</label>
            </div>
            <button class="btn-primary" onclick="saveAPIs()" style="width:100%; margin-top:20px; padding: 15px;">
                💾 SALVAR CONFIGURAÇÕES
            </button>
        </div>
    </div>

    <script>
        // Dados dos Agentes
        const animals = [
            {name: "Leão", icon: "🦁"}, {name: "Tigre", icon: "🐯"}, 
            {name: "Elefante", icon: "🐘"}, {name: "Hipopótamo", icon: "🦛"}, 
            {name: "Polvo", icon: "🐙"}, {name: "Lobo", icon: "🐺"}, 
            {name: "Tubarão", icon: "🦈"}, {name: "Orca", icon: "🐋"}, 
            {name: "Rinoceronte", icon: "🦏"}, {name: "Falcão", icon: "🦅"}, 
            {name: "Crocodilo", icon: "🐊"}, {name: "Cavalo", icon: "🐴"}, 
            {name: "Gorila", icon: "🦍"}, {name: "Ovelha", icon: "🐑"}, 
            {name: "Carneiro", icon: "🐏"}, {name: "Coelho", icon: "🐰"}, 
            {name: "Alce", icon: ""}, {name: "Marlin", icon: "🐟"}, 
            {name: "Urso Pardo", icon: "🐻"}, {name: "Leopardo", icon: "🐆"}, 
            {name: "Canguru", icon: "🦘"}, {name: "Bisão", icon: "🦬"}
        ];

        const pokemons = [
            {name: "Incineroar", icon: "🔥"}, {name: "Pyroar", icon: "🦁"}, 
            {name: "Lycanroc", icon: "🐺"}, {name: "Garchomp", icon: "🦈"}, 
            {name: "Kyogre", icon: "🐋"}, {name: "Rhyperior", icon: "🦏"}, 
            {name: "Talonflame", icon: "🦅"}, {name: "Feraligatr", icon: "🐊"}, 
            {name: "Rapidash", icon: "🦄"}, {name: "Rillaboom", icon: "🦍"}, 
            {name: "Wooloo", icon: "🐑"}, {name: "Dubwool", icon: "🐏"}, 
            {name: "Cinderace", icon: "🐰"}, {name: "Stantler", icon: "🦌"}, 
            {name: "Barraskewda", icon: "🐟"}, {name: "Ursaring", icon: "🐻"}, 
            {name: "Liepard", icon: "🐆"}, {name: "Kangaskhan", icon: "🦘"}, 
            {name: "Bouffalant", icon: "🦬"}, {name: "Copperajah", icon: "🐘"}, 
            {name: "Hippowdon", icon: "🦛"}, {name: "Octillery", icon: "🐙"}
        ];

        // WebSocket Connection
        let ws;
        function connectWebSocket() {
            ws = new WebSocket("ws://localhost:8001/ws");
            ws.onopen = () => log('cortexLog', "✅ Conectado ao servidor");
            ws.onmessage = (event) => handleSystemMessage(JSON.parse(event.data));
            ws.onclose = () => setTimeout(connectWebSocket, 3000);
        }

        function handleSystemMessage(data) {
            if(data.type === 'SYSTEM_MSG') {
                log('cortexLog', data.content);
                log('nexoLog', data.content);
            } else if(data.type === 'RESEARCH_RESULT') {
                const logId = data.side === 'cortex' ? 'cortexLog' : 'nexoLog';
                log(logId, `📥 RESULTADO: ${data.content}`);
            } else if(data.type === 'AGENT_UPDATE') {
                updateAgentStatus(data.agent, data.status);
            }
        }

        function log(elementId, msg) {
            const box = document.getElementById(elementId);
            const time = new Date().toLocaleTimeString();
            box.innerHTML += `<div>[${time}] ${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        function createRadialGraph(containerId, agents) {
            const container = document.getElementById(containerId);
            const radius = 160; 
            const centerX = container.offsetWidth / 2;
            const centerY = container.offsetHeight / 2;

            agents.forEach((agent, index) => {
                const angle = (index / agents.length) * 2 * Math.PI - Math.PI / 2;
                const x = centerX + radius * Math.cos(angle) - 30;
                const y = centerY + radius * Math.sin(angle) - 30;

                const node = document.createElement('div');
                node.className = 'agent-node active';
                node.id = `${containerId}-${agent.name.replace(/\s/g, '')}`;
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerHTML = `
                    <div class="agent-icon">${agent.icon}</div>
                    <div class="agent-name">${agent.name}</div>
                    <div class="agent-toggle-btn on" onclick="toggleAgent('${agent.name}', event)">ON</div>
                `;
                node.onclick = (e) => {
                    if(!e.target.classList.contains('agent-toggle-btn')) {
                        selectAgent(agent.name);
                    }
                };
                container.appendChild(node);
            });
        }

        function toggleAgent(name, event) {
            event.stopPropagation();
            const btn = event.target;
            const node = btn.parentElement;
            const isOn = btn.classList.contains('on');
            
            if(isOn) {
                btn.classList.remove('on');
                btn.textContent = 'OFF';
                node.classList.remove('active');
                node.classList.add('disabled');
                log('cortexLog', `❌ ${name} desativado`);
            } else {
                btn.classList.add('on');
                btn.textContent = 'ON';
                node.classList.add('active');
                node.classList.remove('disabled');
                log('cortexLog', `✅ ${name} ativado`);
            }

            if(ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'AGENT_TOGGLE',
                    agent: name,
                    status: !isOn
                }));
            }
        }

        function toggleSystem(system) {
            const panel = document.getElementById(`${system}Panel`);
            const statusEl = document.getElementById(`${system}Status`);
            const toggle = panel.querySelector('.toggle-switch');
            const isActive = toggle.classList.contains('active');
            
            if(isActive) {
                toggle.classList.remove('active');
                statusEl.textContent = 'OFF';
                statusEl.style.color = '#666';
                log(`${system}Log`, `🛑 Sistema ${system.toUpperCase()} desligado`);
            } else {
                toggle.classList.add('active');
                statusEl.textContent = 'ON';
                statusEl.style.color = 'var(--neon-green)';
                log(`${system}Log`, `✅ Sistema ${system.toUpperCase()} ligado`);
            }
        }

        function startMatrix() {
            log('cortexLog', "🚀 Matrix ativada - Todos sistemas online");
            log('nexoLog', "🚀 Matrix ativada - Todos sistemas online");
            if(ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({type: 'START_MATRIX'}));
            }
        }

        function stopMatrix() {
            log('cortexLog', "⏹ Matrix desativada");
            log('nexoLog', "⏹ Matrix desativada");
            if(ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({type: 'STOP_MATRIX'}));
            }
        }

        async function research(side) {
            const queryInput = document.getElementById(`${side}Query`);
            const query = queryInput.value;
            if(!query) {
                log(`${side}Log`, "⚠️ Digite uma pergunta primeiro");
                return;
            }

            log(`${side}Log`, `🔍 Buscando: "${query}"...`);
            queryInput.value = '';

            try {
                const res = await fetch("/api/research", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({query, side})
                });
                const data = await res.json();
                if(data.error) log(`${side}Log`, `❌ Erro: ${data.error}`);
            } catch (e) {
                log(`${side}Log`, `❌ Falha de conexão com a API`);
            }
        }

        async function uploadFile(input, side) {
            const file = input.files[0];
            if(!file) return;
            
            log(`${side}Log`, `📂 Enviando arquivo: ${file.name}...`);
            
            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch("/api/upload", { method: "POST", body: formData });
                const data = await res.json();
                log(`${side}Log`, `✅ Arquivo ${data.filename} processado`);
            } catch(e) {
                log(`${side}Log`, `❌ Erro ao enviar arquivo`);
            }
        }

        async function syncSystems() {
            log('cortexLog', "🔄 Iniciando sincronização entre Cortex e Nexo...");
            log('nexoLog', "🔄 Recebendo dados do Cortex...");
            
            try {
                await fetch("/api/sync", { method: "POST" });
                log('cortexLog', "✅ Sincronização concluída");
                log('nexoLog', "✅ Sincronização concluída");
            } catch(e) {
                log('cortexLog', "❌ Erro na sincronização");
            }
        }

        function selectAgent(name) {
            log('cortexLog', ` Selecionado: ${name}`);
        }

        function updateAgentStatus(name, status) {
            // Atualiza status visual do agente
        }

        function openApiModal() { 
            document.getElementById('apiModal').style.display = 'flex'; 
        }
        
        function closeApiModal() { 
            document.getElementById('apiModal').style.display = 'none'; 
        }

        function saveAPIs() {
            log('cortexLog', "💾 Configurações de API salvas");
            closeApiModal();
        }

        // Initialize
        window.onload = () => {
            createRadialGraph('cortexGraph', animals);
            createRadialGraph('nexoGraph', pokemons);
            connectWebSocket();
        };

        // Enter key to search
        document.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                if(document.activeElement.id === 'cortexQuery') research('cortex');
                if(document.activeElement.id === 'nexoQuery') research('nexo');
            }
        });
    </script>
</body>
</html>
